<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Landscaping Industry Market Report – Scene</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── Scene canvas ── */
  .scene {
    position: relative;
    width: 760px;
    height: 900px;
    background: radial-gradient(ellipse at 40% 35%, #f5f5f5 0%, #dcdcdc 100%);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.18);
  }

  /* ── Ambient floor shadow ── */
  .scene::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(0deg, rgba(0,0,0,0.06) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ────────────────────────────────
     MACBOOK
  ──────────────────────────────── */
  .macbook {
    position: absolute;
    top: -30px;
    left: -60px;
    width: 360px;
    transform: rotate(-12deg) perspective(800px) rotateX(8deg);
    transform-origin: center top;
    filter: drop-shadow(8px 16px 24px rgba(0,0,0,0.22));
  }

  /* ────────────────────────────────
     DATA SHEETS
  ──────────────────────────────── */
  .data-sheets {
    position: absolute;
    top: 90px;
    right: -20px;
    width: 310px;
    transform: rotate(4deg);
    filter: drop-shadow(4px 10px 18px rgba(0,0,0,0.14));
  }

  /* ────────────────────────────────
     PEN
  ──────────────────────────────── */
  .pen {
    position: absolute;
    top: 310px;
    right: 48px;
    width: 14px;
    height: 220px;
    transform: rotate(30deg);
    transform-origin: center center;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
    z-index: 10;
  }

  /* ────────────────────────────────
     REPORT COVER
  ──────────────────────────────── */
  .report-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 420px;
    transform: translate(-50%, -45%) rotate(-3deg);
    filter: drop-shadow(6px 14px 28px rgba(0,0,0,0.2));
    z-index: 5;
  }
</style>
</head>
<body>
